# NEXUS — BCRP Series Catalog
# All series codes verified against the live BCRP API (2026-02-06).
#
# API endpoint pattern:
#   https://estadisticas.bcrp.gob.pe/estadisticas/series/api/{codes}/json/{start}/{end}/esp
#
# Processing metadata (Sprint 3):
#   unit_type: index | var_pct | var_pct_yoy | nominal_soles | nominal_usd | rate_pct | level | price_usd
#   seasonal_adjust: x13 | stl | none | already_sa
#   transform: all (log + dlog + yoy) | limited (dlog + yoy) | none
#   publication_lag_days: approximate days after reference month

