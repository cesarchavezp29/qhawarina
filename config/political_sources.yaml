  - name: "AS/COA"
    url: "https://www.as-coa.org/articles/perus-presidential-crisis-timeline"
  - name: "Baker Institute"
    url: "https://www.bakerinstitute.org/research/political-crisis-peru"

# Index configuration
index:
  weights:
    institutional_events: 0.35
    financial: 0.25
    cabinet_stability: 0.20
    business_confidence: 0.20
  weekly_weights:
    # Renormalized without business confidence (monthly only)
    institutional_events: 0.4375  # 35/80
    financial: 0.3125              # 25/80
    cabinet_stability: 0.25        # 20/80
  zscore_window_months: 60
  business_confidence_code: "PD12912AM"

# NLP configuration
nlp:
  model: "joeddav/xlm-roberta-large-xnli"
  candidate_labels:
    - "rutina politica"
    - "tension politica moderada"
    - "conflicto institucional"
    - "crisis constitucional"
    - "quiebre institucional"
  bin3_mapping:
    # NLP score -> bin3
    1: 1
    2: 1
    3: 2
    4: 3
    5: 3

# Ground truth
ground_truth:
  path: "data/raw/political/peru_political_events.xlsx"
  sheets:
    events: "Political Events"
    event_types: "Event Type Codes"
    severity_codes: "Severity Codes"
    presidents: "Presidents Summary"
    high_impact: "High Impact Events"
    sources: "Sources"
  severity_scale: "ordinal_1_3"  # DO NOT rescale
